name: Build CS2-Plugin

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        dotnet-quality: 'preview' # 👈 補上這個，GitHub 才能順利抓到 .NET 10

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Upload DLL
      uses: actions/upload-artifact@v4
      with:
        name: CS2MapChangeStopTV-Binary
        path: bin/Release/net10.0/*.dll # 👈 這裡要同步改成 net10.0 才能抓到檔案！
